<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar - Lumier</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#050505;
            color:white;
            font-family:'Segoe UI',sans-serif;
        }

        .navbar{

            height:80px;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:0 60px;

            background:#000;

            border-bottom:1px solid rgba(212,175,55,.2);
        }

        .logo-navbar img{
            height:70px;
        }

        nav{
            display:flex;
            gap:30px;
        }

        nav a{
            text-decoration:none;
            color:white;
        }

        .active{
            color:#D4AF37;
        }

        /* HERO */

        .search-section{

            padding:120px 20px 60px;

            text-align:center;
        }

        .search-section h1{

            color:#D4AF37;

            font-size:3rem;

            margin-bottom:30px;
        }

        .search-box{

            max-width:700px;

            margin:auto;

            position:relative;
        }

        .search-box i{

            position:absolute;

            left:20px;
            top:50%;

            transform:translateY(-50%);

            color:#D4AF37;
        }

        .search-box input{

            width:100%;

            padding:18px 18px 18px 55px;

            border:none;

            border-radius:50px;

            background:#111;

            color:white;

            font-size:1rem;
        }

        /* RESULTADOS */

        .results{

            width:90%;

            margin:auto;

            display:grid;

            grid-template-columns:
            repeat(auto-fill,minmax(220px,1fr));

            gap:30px;

            padding-bottom:80px;
        }

        .movie-card{

            transition:.3s;

            cursor:pointer;
        }

        .movie-card img{

            width:100%;

            height:330px;

            object-fit:cover;

            border-radius:15px;
        }

        .movie-card h3{

            text-align:center;

            margin-top:12px;
        }

        .movie-card:hover{

            transform:
            translateY(-8px)
            scale(1.03);
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <header class="navbar">

        <div class="logo-navbar">
            <img src="img/lumier-logo.png" alt="Lumier">
        </div>

        <nav>
            <a href="index.html">Início</a>
            <a href="#">Filmes</a>
            <a href="#">Séries</a>
            <a href="#" class="active">Pesquisar</a>
        </nav>

    </header>

    <!-- PESQUISA -->

    <section class="search-section">

        <h1>O que você quer assistir?</h1>

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Pesquisar filmes, séries ou atores...">

        </div>

    </section>

    <!-- RESULTADOS -->

    <section class="results">

        <div class="movie-card">
            <img src="img/interstellar.jpg">
            <h3>Interestelar</h3>
        </div>

        <div class="movie-card">
            <img src="img/inception.jpg">
            <h3>A Origem</h3>
        </div>

        <div class="movie-card">
            <img src="img/duna.jpg">
            <h3>Duna</h3>
        </div>

        <div class="movie-card">
            <img src="img/batman.jpg">
            <h3>The Batman</h3>
        </div>

        <div class="movie-card">
            <img src="img/joker.jpg">
            <h3>Coringa</h3>
        </div>

        <div class="movie-card">
            <img src="img/topgun.jpg">
            <h3>Top Gun</h3>
        </div>

    </section>

    <script>

        const input =
        document.getElementById("searchInput");

        const cards =
        document.querySelectorAll(".movie-card");

        input.addEventListener("keyup", () => {

            const texto =
            input.value.toLowerCase();

            cards.forEach(card => {

                const titulo =
                card.querySelector("h3")
                .innerText
                .toLowerCase();

                if(titulo.includes(texto)){

                    card.style.display = "block";
                }
                else{

                    card.style.display = "none";
                }

            });

        });

    </script>

</body>

</html>
